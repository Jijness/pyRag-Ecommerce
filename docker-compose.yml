name: shopx
services:

  # ──────────────── DATABASE ──────────────────────────────
  mysql:
    image: mysql:8.0
    hostname: mysql
    container_name: shopx-mysql
    restart: "no"
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_ROOT_HOST: "%"
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - shopx_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────── MESSAGE BROKER ────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: shopx-rabbitmq
    restart: "no"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.22
    hostname: neo4j
    container_name: shopx-neo4j
    restart: "no"
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-learnmart_graph_password}
      N4J_USER: ${NEO4J_USER:-neo4j}
      N4J_PASS: ${NEO4J_PASSWORD:-learnmart_graph_password}
    volumes:
      - shopx_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $$N4J_USER -p $$N4J_PASS 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────── API GATEWAY ────────────────────
  api_gateway:
    build: ./api_gateway
    container_name: shopx-gateway
    restart: "no"
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ──────────────── BACKEND SERVICES (DDD 7 Services) ─────────────────
  user_service:
    build: ./backend-services/user_service
    container_name: shopx-user_service
    restart: "no"
    ports:
      - "8001:8001"
    volumes:
      - ./backend-services/user_service:/app
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8001 --reload
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/user_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    depends_on:
      mysql:
        condition: service_healthy

  product_service:
    build: ./backend-services/product_service
    container_name: shopx-product_service
    restart: "no"
    ports:
      - "8002:8002"
    volumes:
      - ./backend-services/product_service:/app
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8002 --reload
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/product_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  cart_service:
    build: ./backend-services/cart_service
    container_name: shopx-cart_service
    restart: "no"
    ports:
      - "8003:8003"
    volumes:
      - ./backend-services/cart_service:/app
    command: python manage.py runserver 0.0.0.0:8003
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/cart_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  order_service:
    build: ./backend-services/order_service
    container_name: shopx-order_service
    restart: "no"
    ports:
      - "8004:8004"
    volumes:
      - ./backend-services/order_service:/app
    command: python manage.py runserver 0.0.0.0:8004
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/order_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  payment_service:
    build: ./backend-services/payment_service
    container_name: shopx-payment_service
    restart: "no"
    ports:
      - "8005:8005"
    volumes:
      - ./backend-services/payment_service:/app
    command: python manage.py runserver 0.0.0.0:8005
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/payment_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: mysql
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  shipping_service:
    build: ./backend-services/shipping_service
    container_name: shopx-shipping_service
    restart: "no"
    ports:
      - "8006:8006"
    volumes:
      - ./backend-services/shipping_service:/app
    command: python manage.py runserver 0.0.0.0:8006
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/shipping_db
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: mysql
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai_service:
    build: ./backend-services/ai_chat_service
    container_name: shopx-ai_service
    restart: "no"
    ports:
      - "8007:8007"
    volumes:
      - ./backend-services/ai_chat_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD:-123456}@mysql:3306/ai_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-learnmart_graph_password}
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shopx-frontend
    restart: "no"
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
    depends_on:
      api_gateway:
        condition: service_started

volumes:
  shopx_mysql_data:
    name: shopx_mysql_data
  shopx_neo4j_data:
    name: shopx_neo4j_data
